<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultra-Realistic 3D Solar System + Gargantua</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            cursor: grab;
        }

        body:active {
            cursor: grabbing;
        }

        canvas {
            display: block;
        }

        #info {
            position: absolute;
            top: 12px;
            width: 100%;
            text-align: center;
            color: #bbb;
            font-family: 'Segoe UI', system-ui, sans-serif;
            pointer-events: none;
            text-shadow: 0 0 8px rgba(0, 0, 0, 0.9);
            z-index: 10;
            font-size: 14px;
            letter-spacing: 0.3px;
        }

        #info strong {
            color: #ffcc80;
        }

    </style>
</head>

<body>
    <div id="info">
        <strong>Left Click:</strong> Rotate &nbsp;|&nbsp; <strong>Right Click:</strong> Pan &nbsp;|&nbsp;
        <strong>Scroll:</strong> Zoom to Cursor<br>
        <strong>Double-Click a Planet/Black Hole</strong> to lock focus &nbsp;|&nbsp; <strong>Double-Click
            space</strong> to reset
    </div>
    <!-- 1. Three.js Core -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- 2. Controls -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <!-- 3. Shaders (Required for Bloom and ShaderPass) -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <!-- 4. Post-Processing Dependencies (ORDER IS CRITICAL) -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/Pass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
    <script>
        (function () {
            // ─────────────────────────────────────
            // 1. SCENE, CAMERA, RENDERER
            // ─────────────────────────────────────
            const scene = new THREE.Scene()
            scene.fog = new THREE.FogExp2(0x000010, 0.00000025)

            const camera = new THREE.PerspectiveCamera(42, window.innerWidth / window.innerHeight, 0.5, 6000)
            camera.position.set(0, 45, 140)
            camera.lookAt(0, 0, 0)

            const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance", alpha: false })
            renderer.setSize(window.innerWidth, window.innerHeight)
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2))
            renderer.outputEncoding = THREE.sRGBEncoding
            renderer.toneMapping = THREE.ACESFilmicToneMapping
            renderer.toneMappingExposure = 1.0
            renderer.shadowMap.enabled = true
            renderer.shadowMap.type = THREE.PCFSoftShadowMap
            document.body.appendChild(renderer.domElement)

            // ─────────────────────────────────────
            // 2. POST-PROCESSING (BLOOM)
            // ─────────────────────────────────────
            const composer = new THREE.EffectComposer(renderer)
            const renderPass = new THREE.RenderPass(scene, camera)
            composer.addPass(renderPass)

            const bloomPass = new THREE.UnrealBloomPass(
                new THREE.Vector2(window.innerWidth, window.innerHeight),
                1.4,
                0.5,
                0.75
            )
            composer.addPass(bloomPass)

            // ─────────────────────────────────────
            // 3. CONTROLS
            // ─────────────────────────────────────
            const controls = new THREE.OrbitControls(camera, renderer.domElement)
            controls.enableDamping = true
            controls.dampingFactor = 0.08
            controls.enableZoom = false
            controls.target.set(0, 0, 0)
            controls.maxDistance = 2500 // Increased to allow viewing the black hole properly
            controls.minDistance = 8
            controls.update()

            // ─────────────────────────────────────
            // 4. ENHANCED STARFIELD
            // ─────────────────────────────────────
            const starCount = 25000
            const starGeo = new THREE.BufferGeometry()
            const positions = new Float32Array(starCount * 3)
            const colors = new Float32Array(starCount * 3)
            const sizes = new Float32Array(starCount)

            const starColorPalette = [
                new THREE.Color(0xffffff),
                new THREE.Color(0xfff8e7),
                new THREE.Color(0xfff4d6),
                new THREE.Color(0xd4e4ff),
                new THREE.Color(0xffe8c8),
                new THREE.Color(0xc8d8ff),
                new THREE.Color(0xffcc88),
                new THREE.Color(0xaaccff),
                new THREE.Color(0xffbb66),
                new THREE.Color(0x8899ff),
            ]

            for (let i = 0; i < starCount; i++) {
                const theta = Math.random() * Math.PI * 2
                const phi = Math.acos(2 * Math.random() - 1)
                const dist = 800 + Math.random() * 2500
                positions[i * 3] = Math.sin(phi) * Math.cos(theta) * dist
                positions[i * 3 + 1] = Math.sin(phi) * Math.sin(theta) * dist
                positions[i * 3 + 2] = Math.cos(phi) * dist

                const col = starColorPalette[Math.floor(Math.random() * starColorPalette.length)].clone()
                const brightness = 0.5 + Math.random() * 0.5
                colors[i * 3] = col.r * brightness
                colors[i * 3 + 1] = col.g * brightness
                colors[i * 3 + 2] = col.b * brightness

                sizes[i] = 0.15 + Math.random() * 1.6
            }

            starGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3))
            starGeo.setAttribute('color', new THREE.BufferAttribute(colors, 3))
            starGeo.setAttribute('size', new THREE.BufferAttribute(sizes, 1))

            const starMat = new THREE.PointsMaterial({
                size: 0.35,
                vertexColors: true,
                transparent: true,
                opacity: 0.85,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
                sizeAttenuation: true,
            })
            const stars = new THREE.Points(starGeo, starMat)
            scene.add(stars)

            // ─────────────────────────────────────
            // 5. LIGHTING
            // ─────────────────────────────────────
            const ambientLight = new THREE.AmbientLight(0x0a0a18, 0.7)
            scene.add(ambientLight)

            const sunLight = new THREE.PointLight(0xfff8e7, 5.5, 1500, 0.6)
            sunLight.castShadow = true
            sunLight.shadow.mapSize.width = 2048
            sunLight.shadow.mapSize.height = 2048
            sunLight.shadow.bias = -0.0004
            sunLight.shadow.normalBias = 0.02
            sunLight.shadow.camera.near = 0.5
            sunLight.shadow.camera.far = 1500
            scene.add(sunLight)

            const sunLightWarm = new THREE.PointLight(0xffaa44, 2.5, 800, 0.8)
            sunLightWarm.position.set(0, 0, 0)
            scene.add(sunLightWarm)

            // ─────────────────────────────────────
            // 6. CANVAS TEXTURE GENERATORS
            // ─────────────────────────────────────
            function createCanvasTexture(width, height, drawFn) {
                const canvas = document.createElement('canvas')
                canvas.width = width
                canvas.height = height
                const ctx = canvas.getContext('2d')
                drawFn(ctx, width, height)
                const tex = new THREE.CanvasTexture(canvas)
                tex.wrapS = THREE.RepeatWrapping
                tex.wrapU = THREE.RepeatWrapping

                tex.encoding = THREE.sRGBEncoding

                tex.minFilter = THREE.LinearMipmapLinearFilter
                tex.magFilter = THREE.LinearFilter
                tex.generateMipmaps = true
                return tex
            }

            function sunTextureDraw(ctx, w, h) {
                const grad = ctx.createRadialGradient(w / 2, h / 2, 0, w / 2, h / 2, w * 0.7)
                grad.addColorStop(0, '#fffbe0')
                grad.addColorStop(0.25, '#ffe580')
                grad.addColorStop(0.5, '#ffb800')
                grad.addColorStop(0.75, '#ff7b00')
                grad.addColorStop(1, '#e04400')
                ctx.fillStyle = grad
                ctx.fillRect(0, 0, w, h)

                for (let i = 0; i < 8000; i++) {
                    const x = Math.random() * w
                    const y = Math.random() * h
                    const r = Math.random() * 3.5
                    const alpha = Math.random() * 0.45
                    const bright = Math.random() > 0.5
                    ctx.beginPath()
                    ctx.arc(x, y, r, 0, Math.PI * 2)
                    ctx.fillStyle = bright ?
                        `rgba(255,255,220,${alpha})` :
                        `rgba(180,60,0,${alpha * 0.7})`
                    ctx.fill()
                }

                for (let i = 0; i < 15; i++) {
                    const sx = Math.random() * w
                    const sy = Math.random() * h
                    const sr = 4 + Math.random() * 18
                    const gradSpot = ctx.createRadialGradient(sx, sy, sr * 0.2, sx, sy, sr)
                    gradSpot.addColorStop(0, 'rgba(100,20,0,0.7)')
                    gradSpot.addColorStop(0.5, 'rgba(160,50,0,0.35)')
                    gradSpot.addColorStop(1, 'rgba(255,140,0,0)')
                    ctx.beginPath()
                    ctx.arc(sx, sy, sr, 0, Math.PI * 2)
                    ctx.fillStyle = gradSpot
                    ctx.fill()
                }

                for (let i = 0; i < 300; i++) {
                    const fx = Math.random() * w
                    const fy = Math.random() * h
                    ctx.fillStyle = `rgba(255,200,80,${Math.random() * 0.3})`
                    ctx.fillRect(fx, fy, Math.random() * 6, Math.random() * 2)
                }
            }

            function mercuryTextureDraw(ctx, w, h) {
                ctx.fillStyle = '#9e9e9e'
                ctx.fillRect(0, 0, w, h)
                for (let i = 0; i < 5000; i++) {
                    const x = Math.random() * w
                    const y = Math.random() * h
                    const r = Math.random() * 4
                    const shade = 120 + Math.random() * 80
                    ctx.fillStyle = `rgb(${shade},${shade},${shade})`
                    ctx.beginPath()
                    ctx.arc(x, y, r, 0, Math.PI * 2)
                    ctx.fill()
                }
                for (let i = 0; i < 200; i++) {
                    const cx = Math.random() * w
                    const cy = Math.random() * h
                    const cr = 3 + Math.random() * 12
                    const grad = ctx.createRadialGradient(cx, cy, cr * 0.1, cx, cy, cr)
                    grad.addColorStop(0, 'rgba(60,60,60,0.7)')
                    grad.addColorStop(0.6, 'rgba(140,140,140,0.3)')
                    grad.addColorStop(1, 'rgba(180,180,180,0)')
                    ctx.fillStyle = grad
                    ctx.beginPath()
                    ctx.arc(cx, cy, cr, 0, Math.PI * 2)
                    ctx.fill()
                }
            }

            function venusTextureDraw(ctx, w, h) {
                const grad = ctx.createLinearGradient(0, 0, 0, h)
                grad.addColorStop(0, '#f5e6c8')
                grad.addColorStop(0.3, '#e8d5a3')
                grad.addColorStop(0.5, '#f0dcb0')
                grad.addColorStop(0.7, '#e4cfa0')
                grad.addColorStop(1, '#f2e0b8')
                ctx.fillStyle = grad
                ctx.fillRect(0, 0, w, h)
                for (let i = 0; i < 2000; i++) {
                    const x = Math.random() * w
                    const y = Math.random() * h
                    ctx.fillStyle = `rgba(255,240,210,${Math.random() * 0.25})`
                    ctx.fillRect(x, y, Math.random() * 8, Math.random() * 3)
                }
                for (let i = 0; i < 400; i++) {
                    const sx = Math.random() * w
                    const sy = Math.random() * h
                    const sw = 10 + Math.random() * 50
                    const sh = 2 + Math.random() * 6
                    ctx.fillStyle = `rgba(200,170,120,${Math.random() * 0.2})`
                    ctx.beginPath()
                    ctx.ellipse(sx, sy, sw, sh, Math.random() * 0.3, 0, Math.PI * 2)
                    ctx.fill()
                }
            }

            function marsTextureDraw(ctx, w, h) {
                const grad = ctx.createLinearGradient(0, 0, 0, h)
                grad.addColorStop(0, '#e8c8b0')
                grad.addColorStop(0.3, '#d4956b')
                grad.addColorStop(0.5, '#c97a4a')
                grad.addColorStop(0.7, '#d4956b')
                grad.addColorStop(1, '#e8c8b0')
                ctx.fillStyle = grad
                ctx.fillRect(0, 0, w, h)
                for (let i = 0; i < 4000; i++) {
                    const x = Math.random() * w
                    const y = Math.random() * h
                    const r = Math.random() * 3
                    ctx.fillStyle = `rgba(${140 + Math.random() * 80},${50 + Math.random() * 60},${20 + Math.random() * 30},${Math.random() * 0.5})`
                    ctx.beginPath()
                    ctx.arc(x, y, r, 0, Math.PI * 2)
                    ctx.fill()
                }
                for (let i = 0; i < 8; i++) {
                    const dx = Math.random() * w
                    const dy = Math.random() * h
                    const dr = 15 + Math.random() * 40
                    const dg = ctx.createRadialGradient(dx, dy, dr * 0.1, dx, dy, dr)
                    dg.addColorStop(0, 'rgba(80,30,10,0.55)')
                    dg.addColorStop(1, 'rgba(200,120,70,0)')
                    ctx.fillStyle = dg
                    ctx.beginPath()
                    ctx.arc(dx, dy, dr, 0, Math.PI * 2)
                    ctx.fill()
                }
                const poleGradTop = ctx.createLinearGradient(0, 0, 0, h * 0.18)
                poleGradTop.addColorStop(0, 'rgba(240,230,220,0.85)')
                poleGradTop.addColorStop(1, 'rgba(240,230,220,0)')
                ctx.fillStyle = poleGradTop
                ctx.fillRect(0, 0, w, h * 0.18)
                const poleGradBottom = ctx.createLinearGradient(0, h, 0, h * 0.82)
                poleGradBottom.addColorStop(0, 'rgba(240,230,220,0.85)')
                poleGradBottom.addColorStop(1, 'rgba(240,230,220,0)')
                ctx.fillStyle = poleGradBottom
                ctx.fillRect(0, h * 0.82, w, h * 0.18)
            }

            function jupiterTextureDraw(ctx, w, h) {
                const baseGrad = ctx.createLinearGradient(0, 0, 0, h)
                baseGrad.addColorStop(0, '#d4b896')
                baseGrad.addColorStop(0.08, '#c4956a')
                baseGrad.addColorStop(0.16, '#e8d5b8')
                baseGrad.addColorStop(0.24, '#b87040')
                baseGrad.addColorStop(0.32, '#f0e0c8')
                baseGrad.addColorStop(0.4, '#cc9966')
                baseGrad.addColorStop(0.48, '#e0c8a0')
                baseGrad.addColorStop(0.56, '#a05530')
                baseGrad.addColorStop(0.64, '#f5e8d0')
                baseGrad.addColorStop(0.72, '#c88050')
                baseGrad.addColorStop(0.8, '#e8d0a8')
                baseGrad.addColorStop(0.88, '#b86838')
                baseGrad.addColorStop(1, '#d4b896')
                ctx.fillStyle = baseGrad
                ctx.fillRect(0, 0, w, h)
                for (let i = 0; i < 3000; i++) {
                    const x = Math.random() * w
                    const y = Math.random() * h
                    ctx.fillStyle = `rgba(${180 + Math.random() * 75},${100 + Math.random() * 80},${40 + Math.random() * 50},${Math.random() * 0.3})`
                    ctx.fillRect(x, y, Math.random() * 15, Math.random() * 2.5)
                }
                const grsX = w * 0.55
                const grsY = h * 0.58
                const grsW = w * 0.13
                const grsH = h * 0.08
                const grsGrad = ctx.createRadialGradient(grsX, grsY, grsW * 0.1, grsX, grsY, grsW)
                grsGrad.addColorStop(0, '#e87850')
                grsGrad.addColorStop(0.4, '#d06040')
                grsGrad.addColorStop(0.7, '#c88860')
                grsGrad.addColorStop(1, 'rgba(200,150,100,0)')
                ctx.fillStyle = grsGrad
                ctx.beginPath()
                ctx.ellipse(grsX, grsY, grsW, grsH, 0, 0, Math.PI * 2)
                ctx.fill()
            }

            function saturnTextureDraw(ctx, w, h) {
                const grad = ctx.createLinearGradient(0, 0, 0, h)
                grad.addColorStop(0, '#f2e8d0')
                grad.addColorStop(0.2, '#e8d8b8')
                grad.addColorStop(0.35, '#f5ecd8')
                grad.addColorStop(0.5, '#e0d0a8')
                grad.addColorStop(0.65, '#f0e4c8')
                grad.addColorStop(0.8, '#e8d8b8')
                grad.addColorStop(1, '#f2e8d0')
                ctx.fillStyle = grad
                ctx.fillRect(0, 0, w, h)
                for (let i = 0; i < 1500; i++) {
                    ctx.fillStyle = `rgba(220,200,160,${Math.random() * 0.2})`
                    ctx.fillRect(Math.random() * w, Math.random() * h, Math.random() * 20, Math.random() * 2)
                }
            }

            function uranusTextureDraw(ctx, w, h) {
                const grad = ctx.createLinearGradient(0, 0, 0, h)
                grad.addColorStop(0, '#c8f0f8')
                grad.addColorStop(0.4, '#a8e8f4')
                grad.addColorStop(0.5, '#b8ecf6')
                grad.addColorStop(0.6, '#a0e0f0')
                grad.addColorStop(1, '#c8f0f8')
                ctx.fillStyle = grad
                ctx.fillRect(0, 0, w, h)
                for (let i = 0; i < 600; i++) {
                    ctx.fillStyle = `rgba(180,230,245,${Math.random() * 0.15})`
                    ctx.fillRect(Math.random() * w, Math.random() * h, Math.random() * 30, Math.random() * 1.5)
                }
            }

            function neptuneTextureDraw(ctx, w, h) {
                const grad = ctx.createLinearGradient(0, 0, 0, h)
                grad.addColorStop(0, '#1a3a8a')
                grad.addColorStop(0.3, '#1e45a0')
                grad.addColorStop(0.5, '#1838a8')
                grad.addColorStop(0.7, '#1e45a0')
                grad.addColorStop(1, '#1a3a8a')
                ctx.fillStyle = grad
                ctx.fillRect(0, 0, w, h)
                for (let i = 0; i < 800; i++) {
                    ctx.fillStyle = `rgba(40,80,180,${Math.random() * 0.2})`
                    ctx.fillRect(Math.random() * w, Math.random() * h, Math.random() * 25, Math.random() * 2)
                }
                for (let i = 0; i < 5; i++) {
                    const sx = Math.random() * w
                    const sy = Math.random() * h
                    const sr = 8 + Math.random() * 20
                    const sg = ctx.createRadialGradient(sx, sy, 0, sx, sy, sr)
                    sg.addColorStop(0, 'rgba(60,100,200,0.4)')
                    sg.addColorStop(1, 'rgba(30,60,160,0)')
                    ctx.fillStyle = sg
                    ctx.beginPath()
                    ctx.arc(sx, sy, sr, 0, Math.PI * 2)
                    ctx.fill()
                }
            }

            function ringTextureDraw(ctx, w, h) {
                const grad = ctx.createLinearGradient(0, 0, w, 0)
                grad.addColorStop(0, 'rgba(180,160,130,0.05)')
                grad.addColorStop(0.08, 'rgba(200,180,150,0.7)')
                grad.addColorStop(0.15, 'rgba(220,200,170,0.9)')
                grad.addColorStop(0.22, 'rgba(180,160,130,0.2)')
                grad.addColorStop(0.28, 'rgba(210,190,160,0.85)')
                grad.addColorStop(0.38, 'rgba(230,210,180,1.0)')
                grad.addColorStop(0.48, 'rgba(200,180,150,0.75)')
                grad.addColorStop(0.52, 'rgba(160,140,110,0.15)')
                grad.addColorStop(0.58, 'rgba(190,170,140,0.55)')
                grad.addColorStop(0.7, 'rgba(210,190,160,0.7)')
                grad.addColorStop(0.82, 'rgba(180,160,130,0.3)')
                grad.addColorStop(0.9, 'rgba(150,130,100,0.1)')
                grad.addColorStop(1, 'rgba(120,100,80,0.02)')
                ctx.fillStyle = grad
                ctx.fillRect(0, 0, w, h)
            }

            // ─────────────────────────────────────
            // 7. SUN
            // ─────────────────────────────────────
            const sunTex = createCanvasTexture(512, 256, sunTextureDraw)
            const sunGeo = new THREE.SphereGeometry(12, 96, 96)
            const sunMat = new THREE.MeshBasicMaterial({
                map: sunTex,
                color: new THREE.Color(1, 0.95, 0.7),
            })
            const sun = new THREE.Mesh(sunGeo, sunMat)
            sun.name = 'Sun'
            scene.add(sun)

            const glowLayers = [
                { radius: 12.5, color: 0xff6600, opacity: 0.55 },
                { radius: 13.2, color: 0xff4400, opacity: 0.35 },
                { radius: 14.0, color: 0xff3300, opacity: 0.2 },
                { radius: 15.0, color: 0xff2200, opacity: 0.1 },
                { radius: 16.5, color: 0xff1100, opacity: 0.05 },
            ]

            const glowMeshes = []
            glowLayers.forEach(layer => {
                const glowGeo = new THREE.SphereGeometry(layer.radius, 64, 64)
                const glowMat = new THREE.MeshBasicMaterial({
                    color: layer.color,
                    transparent: true,
                    opacity: layer.opacity,
                    blending: THREE.AdditiveBlending,
                    side: THREE.BackSide,
                    depthWrite: false,
                })
                const glowMesh = new THREE.Mesh(glowGeo, glowMat)
                sun.add(glowMesh)
                glowMeshes.push(glowMesh)
            })

            const coronaGeo = new THREE.SphereGeometry(12.3, 64, 64)
            const coronaMat = new THREE.MeshBasicMaterial({
                color: 0xffaa00,
                transparent: true,
                opacity: 0.4,
                blending: THREE.AdditiveBlending,
                side: THREE.FrontSide,
                depthWrite: false,
            })
            const corona = new THREE.Mesh(coronaGeo, coronaMat)
            sun.add(corona)

            // ─────────────────────────────────────
            // 8. SUN CORONA PARTICLES
            // ─────────────────────────────────────
            const coronaParticleCount = 600
            const coronaParticleGeo = new THREE.BufferGeometry()
            const coronaParticlePositions = new Float32Array(coronaParticleCount * 3)
            const coronaParticleSizes = new Float32Array(coronaParticleCount)
            for (let i = 0; i < coronaParticleCount; i++) {
                const theta = Math.random() * Math.PI * 2
                const phi = Math.acos(2 * Math.random() - 1)
                const dist = 12.2 + Math.random() * 5
                coronaParticlePositions[i * 3] = Math.sin(phi) * Math.cos(theta) * dist
                coronaParticlePositions[i * 3 + 1] = Math.sin(phi) * Math.sin(theta) * dist
                coronaParticlePositions[i * 3 + 2] = Math.cos(phi) * dist
                coronaParticleSizes[i] = Math.random() * 0.6
            }
            coronaParticleGeo.setAttribute('position', new THREE.BufferAttribute(coronaParticlePositions, 3))
            coronaParticleGeo.setAttribute('size', new THREE.BufferAttribute(coronaParticleSizes, 1))
            const coronaParticleMat = new THREE.PointsMaterial({
                color: 0xffcc66,
                size: 0.25,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
                transparent: true,
                opacity: 0.7,
            })
            const coronaParticles = new THREE.Points(coronaParticleGeo, coronaParticleMat)
            sun.add(coronaParticles)

            // ─────────────────────────────────────
            // 9. PLANET DATA & CREATION
            // ─────────────────────────────────────
            const textureLoader = new THREE.TextureLoader()
            const planets = []
            const interactables = [sun]

            const planetData = [
                {
                    name: 'Mercury', size: 0.8, distance: 24, speed: 0.04, roughness: 0.85, metalness: 0.3,
                    texGen: mercuryTextureDraw, tilt: 0.03
                },
                {
                    name: 'Venus', size: 1.5, distance: 34, speed: 0.015, roughness: 0.55, metalness: 0.05,
                    texGen: venusTextureDraw, tilt: 2.64
                },
                {
                    name: 'Earth',
                    size: 1.6,
                    distance: 48,
                    speed: 0.01,
                    roughness: 0.5,
                    metalness: 0.05,
                    textureUrl: 'https://cdn.jsdelivr.net/gh/mrdoob/three.js@master/examples/textures/planets/earth_atmos_2048.jpg',
                    bumpUrl: 'https://cdn.jsdelivr.net/gh/mrdoob/three.js@master/examples/textures/planets/earth_specular_2048.jpg',
                    cloudUrl: 'https://cdn.jsdelivr.net/gh/mrdoob/three.js@master/examples/textures/planets/earth_clouds_1024.png',
                    tilt: 0.41,
                    hasAtmosphere: true
                },
                {
                    name: 'Mars', size: 1.2, distance: 62, speed: 0.008, roughness: 0.75, metalness: 0.2, texGen: marsTextureDraw,
                    tilt: 0.44
                },
                {
                    name: 'Jupiter', size: 4.5, distance: 90, speed: 0.002, roughness: 0.4, metalness: 0.05,
                    texGen: jupiterTextureDraw, tilt: 0.05
                },
                {
                    name: 'Saturn', size: 3.8, distance: 125, speed: 0.0009, roughness: 0.45, metalness: 0.05,
                    texGen: saturnTextureDraw, tilt: 0.47, hasRing: true
                },
                {
                    name: 'Uranus', size: 2.8, distance: 160, speed: 0.0004, roughness: 0.35, metalness: 0.05,
                    texGen: uranusTextureDraw, tilt: 1.71
                },
                {
                    name: 'Neptune', size: 2.7, distance: 195, speed: 0.0001, roughness: 0.35, metalness: 0.05,
                    texGen: neptuneTextureDraw, tilt: 0.49
                },
            ]

            let earthObj, earthClouds, moonPivot

            planetData.forEach(data => {
                const pivot = new THREE.Object3D()
                pivot.name = data.name + ' Orbit Pivot'
                scene.add(pivot)

                const geo = new THREE.SphereGeometry(data.size, 72, 72)
                let mat

                if (data.textureUrl) {
                    mat = new THREE.MeshStandardMaterial({
                        map: textureLoader.load(data.textureUrl),
                        bumpMap: textureLoader.load(data.bumpUrl),
                        bumpScale: 0.04,
                        roughness: data.roughness,
                        metalness: data.metalness,
                    })
                } else if (data.texGen) {
                    const tex = createCanvasTexture(512, 256, data.texGen)
                    mat = new THREE.MeshStandardMaterial({
                        map: tex,
                        roughness: data.roughness,
                        metalness: data.metalness,
                    })
                } else {
                    mat = new THREE.MeshStandardMaterial({
                        color: 0x888888,
                        roughness: data.roughness,
                        metalness: data.metalness,
                    })
                }

                const mesh = new THREE.Mesh(geo, mat)
                mesh.position.x = data.distance
                mesh.castShadow = true
                mesh.receiveShadow = true
                mesh.name = data.name
                mesh.rotation.z = data.tilt || 0
                pivot.add(mesh)
                interactables.push(mesh)

                if (data.name === 'Earth') {
                    earthObj = mesh
                }

                if (data.cloudUrl) {
                    const cloudGeo = new THREE.SphereGeometry(data.size + 0.04, 72, 72)
                    const cloudMat = new THREE.MeshStandardMaterial({
                        map: textureLoader.load(data.cloudUrl),
                        transparent: true,
                        opacity: 0.7,
                        blending: THREE.AdditiveBlending,
                        depthWrite: false,
                    })
                    earthClouds = new THREE.Mesh(cloudGeo, cloudMat)
                    mesh.add(earthClouds)
                }

                if (data.hasAtmosphere) {
                    const atmoGeo = new THREE.SphereGeometry(data.size + 0.15, 64, 64)
                    const atmoMat = new THREE.MeshBasicMaterial({
                        color: 0x4488ff,
                        transparent: true,
                        opacity: 0.18,
                        blending: THREE.AdditiveBlending,
                        side: THREE.FrontSide,
                        depthWrite: false,
                    })
                    const atmosphere = new THREE.Mesh(atmoGeo, atmoMat)
                    mesh.add(atmosphere)
                }

                if (data.hasRing) {
                    const ringTex = createCanvasTexture(512, 64, ringTextureDraw)
                    const innerR = data.size * 1.35
                    const outerR = data.size * 2.4
                    const ringGeo = new THREE.RingGeometry(innerR, outerR, 180, 1)
                    const pos = ringGeo.attributes.position
                    const uv = ringGeo.attributes.uv
                    for (let i = 0; i < pos.count; i++) {
                        const x = pos.getX(i)
                        const y = pos.getY(i)
                        const dist = Math.sqrt(x * x + y * y)
                        const u = (dist - innerR) / (outerR - innerR)
                        uv.setXY(i, u, 0.5)
                    }
                    const ringMat = new THREE.MeshStandardMaterial({
                        map: ringTex,
                        side: THREE.DoubleSide,
                        transparent: true,
                        opacity: 0.85,
                        roughness: 0.7,
                        metalness: 0.05,
                        depthWrite: true,
                    })
                    const ring = new THREE.Mesh(ringGeo, ringMat)
                    ring.rotation.x = Math.PI / 2.15
                    ring.castShadow = true
                    ring.receiveShadow = true
                    ring.name = 'Saturn Ring'
                    mesh.add(ring)

                    const ringGlowGeo = new THREE.RingGeometry(innerR - 0.1, outerR + 0.1, 180, 1)
                    const ringGlowMat = new THREE.MeshBasicMaterial({
                        color: 0xd4c8a0,
                        side: THREE.DoubleSide,
                        transparent: true,
                        opacity: 0.08,
                        blending: THREE.AdditiveBlending,
                        depthWrite: false,
                    })
                    const ringGlow = new THREE.Mesh(ringGlowGeo, ringGlowMat)
                    ringGlow.rotation.x = Math.PI / 2.15
                    mesh.add(ringGlow)
                }

                const pathGeo = new THREE.RingGeometry(data.distance - 0.06, data.distance + 0.06, 200)
                const pathMat = new THREE.MeshBasicMaterial({
                    color: 0xffffff,
                    transparent: true,
                    opacity: 0.025,
                    side: THREE.DoubleSide,
                    depthWrite: false,
                })
                const path = new THREE.Mesh(pathGeo, pathMat)
                path.rotation.x = Math.PI / 2
                path.name = data.name + ' Orbit'
                scene.add(path)

                planets.push({ pivot, mesh, speed: data.speed, distance: data.distance })
            })

            // ─────────────────────────────────────
            // 10. MOON
            // ─────────────────────────────────────
            const moonGeo = new THREE.SphereGeometry(0.4, 64, 64)
            const moonMat = new THREE.MeshStandardMaterial({
                map: textureLoader.load(
                    'https://cdn.jsdelivr.net/gh/mrdoob/three.js@master/examples/textures/planets/moon_1024.jpg'),
                roughness: 0.95,
                bumpMap: textureLoader.load(
                    'https://cdn.jsdelivr.net/gh/mrdoob/three.js@master/examples/textures/planets/moon_1024.jpg'),
                bumpScale: 0.03,
                metalness: 0.05,
            })
            const moon = new THREE.Mesh(moonGeo, moonMat)
            moon.castShadow = true
            moon.receiveShadow = true
            moon.name = 'Moon'

            moonPivot = new THREE.Object3D()
            moonPivot.name = 'Moon Pivot'
            earthObj.add(moonPivot)
            moon.position.x = 4.5
            moonPivot.add(moon)
            interactables.push(moon)

            // ─────────────────────────────────────
            // 11. ASTEROID BELT (InstancedMesh)
            // ─────────────────────────────────────
            const asteroidCount = 900
            const asteroidGeo = new THREE.IcosahedronGeometry(0.25, 0)
            const asteroidMat = new THREE.MeshStandardMaterial({
                color: 0x8a7a6a,
                roughness: 0.9,
                metalness: 0.3,
                flatShading: true,
            })
            const asteroidBelt = new THREE.InstancedMesh(asteroidGeo, asteroidMat, asteroidCount)
            asteroidBelt.castShadow = true
            asteroidBelt.receiveShadow = true
            asteroidBelt.name = 'Asteroid Belt'

            const dummy = new THREE.Object3D()
            const innerBelt = 70
            const outerBelt = 86
            for (let i = 0; i < asteroidCount; i++) {
                const angle = Math.random() * Math.PI * 2
                const radius = innerBelt + Math.random() * (outerBelt - innerBelt)
                const yOffset = (Math.random() - 0.5) * 6
                dummy.position.set(
                    Math.cos(angle) * radius,
                    yOffset,
                    Math.sin(angle) * radius
                )
                dummy.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI)
                const s = 0.3 + Math.random() * 2.0
                dummy.scale.set(s, s * (0.5 + Math.random() * 0.5), s * (0.5 + Math.random() * 0.5))
                dummy.updateMatrix()
                asteroidBelt.setMatrixAt(i, dummy.matrix)
            }
            asteroidBelt.instanceMatrix.needsUpdate = true
            scene.add(asteroidBelt)

            // ─────────────────────────────────────
            // 11.5 BLACK HOLE (GARGANTUA STYLE)
            // ─────────────────────────────────────
            const blackHoleGroup = new THREE.Group()
            blackHoleGroup.position.set(1200, -80, -900) // Far out in space
            scene.add(blackHoleGroup)

            // 1. Event Horizon (The absolute black core)
            const ehRadius = 30
            const ehGeo = new THREE.SphereGeometry(ehRadius, 64, 64)
            const ehMat = new THREE.MeshBasicMaterial({ color: 0x000000 })
            const eventHorizon = new THREE.Mesh(ehGeo, ehMat)
            eventHorizon.name = 'Black Hole'
            blackHoleGroup.add(eventHorizon)
            interactables.push(eventHorizon) // Make it clickable

            // 2. Accretion Disk Texture Generator
            function bhDiskTextureDraw(ctx, w, h) {
                const grad = ctx.createLinearGradient(0, 0, w, 0)
                grad.addColorStop(0, 'rgba(0,0,0,0)')
                grad.addColorStop(0.05, 'rgba(255, 240, 200, 1)')
                grad.addColorStop(0.1, 'rgba(255, 200, 100, 0.95)')
                grad.addColorStop(0.25, 'rgba(255, 120, 40, 0.8)')
                grad.addColorStop(0.5, 'rgba(180, 50, 10, 0.6)')
                grad.addColorStop(0.75, 'rgba(80, 20, 5, 0.2)')
                grad.addColorStop(1, 'rgba(0,0,0,0)')
                ctx.fillStyle = grad
                ctx.fillRect(0, 0, w, h)

                // Add swirling orbital streaks to disk
                ctx.globalCompositeOperation = 'lighter'
                for (let i = 0; i < 3000; i++) {
                    const x = Math.random() * w
                    const y = Math.random() * h
                    const length = 15 + Math.random() * 60
                    const opacity = Math.random() * 0.4
                    ctx.fillStyle = `rgba(255, 180, 80, ${opacity})`
                    ctx.fillRect(x, y, length, Math.random() * 1.5)
                }
            }

            // 3. Accretion Disk Mesh
            const bhDiskTex = createCanvasTexture(1024, 64, bhDiskTextureDraw)
            const diskInnerR = ehRadius * 1.3
            const diskOuterR = ehRadius * 3.5
            const bhDiskGeo = new THREE.RingGeometry(diskInnerR, diskOuterR, 128, 64)

            // Map the UVs linearly along the radius to map our linear gradient texture properly
            const pos = bhDiskGeo.attributes.position
            const uv = bhDiskGeo.attributes.uv
            for (let i = 0; i < pos.count; i++) {
                const x = pos.getX(i)
                const y = pos.getY(i)
                const dist = Math.sqrt(x * x + y * y)
                const u = (dist - diskInnerR) / (diskOuterR - diskInnerR)
                uv.setXY(i, u, 0.5)
            }

            const bhDiskMat = new THREE.MeshBasicMaterial({
                map: bhDiskTex,
                side: THREE.DoubleSide,
                transparent: true,
                opacity: 0.95,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            })
            const accretionDisk = new THREE.Mesh(bhDiskGeo, bhDiskMat)
            accretionDisk.rotation.x = Math.PI / 1.9 // Tilted
            accretionDisk.rotation.y = Math.PI / 8
            blackHoleGroup.add(accretionDisk)

            // 4. Lensing Halo (Fresnel Glow to fake bent light around the sphere)
            const bhHaloGeo = new THREE.SphereGeometry(ehRadius + 1.5, 64, 64)
            const bhHaloMat = new THREE.ShaderMaterial({
                uniforms: {
                    c: { type: "f", value: 0.1 },
                    p: { type: "f", value: 2.0 },
                    glowColor: { type: "c", value: new THREE.Color(0xffaa55) },
                    viewVector: { type: "v3", value: camera.position }
                },
                vertexShader: `
                    uniform vec3 viewVector;
                    varying float intensity;
                    void main() {
                        vec3 vNormal = normalize( normalMatrix * normal );
                        vec3 vNormel = normalize( normalMatrix * viewVector );
                        intensity = pow( c - dot(vNormal, vNormel), p );
                        gl_Position = projectionMatrix * modelViewMatrix * vec4( position, 1.0 );
                    }
                `,
                fragmentShader: `
                    uniform vec3 glowColor;
                    varying float intensity;
                    void main() {
                        vec3 glow = glowColor * intensity;
                        gl_FragColor = vec4( glow, intensity * 0.8 );
                    }
                `,
                side: THREE.BackSide,
                blending: THREE.AdditiveBlending,
                transparent: true,
                depthWrite: false
            })
            const bhHalo = new THREE.Mesh(bhHaloGeo, bhHaloMat)
            blackHoleGroup.add(bhHalo)

            // 5. "Pulling Space" Particle System for animation
            const bhParticleCount = 4000
            const bhParticleGeo = new THREE.BufferGeometry()
            const bhPositions = new Float32Array(bhParticleCount * 3)
            const bhRadii = new Float32Array(bhParticleCount)
            const bhAngles = new Float32Array(bhParticleCount * 2) // theta, phi

            for (let i = 0; i < bhParticleCount; i++) {
                bhRadii[i] = 40 + Math.random() * 800
                bhAngles[i * 2] = Math.random() * Math.PI * 2 // Theta (around Y)
                // Concentrate particles mostly near the accretion disk plane
                bhAngles[i * 2 + 1] = (Math.random() - 0.5) * 0.6 + Math.PI / 2
            }
            bhParticleGeo.setAttribute('position', new THREE.BufferAttribute(bhPositions, 3))

            const bhParticleMat = new THREE.PointsMaterial({
                color: 0xffddaa,
                size: 0.8,
                transparent: true,
                opacity: 0.0, // Invisible until focused
                blending: THREE.AdditiveBlending,
                depthWrite: false
            })
            const bhParticles = new THREE.Points(bhParticleGeo, bhParticleMat)

            // Align particle rotation somewhat with accretion disk
            bhParticles.rotation.x = Math.PI / 1.9
            bhParticles.rotation.y = Math.PI / 8
            blackHoleGroup.add(bhParticles)


            // ─────────────────────────────────────
            // 12. RAYCASTER & CUSTOM ZOOM
            // ─────────────────────────────────────
            const raycaster = new THREE.Raycaster()
            const mouse = new THREE.Vector2()
            let targetObject = null

            window.addEventListener('wheel', (event) => {
                event.preventDefault()
                if (targetObject) targetObject = null

                const zoomFactor = event.deltaY > 0 ? 1.08 : 0.92
                mouse.x = (event.clientX / window.innerWidth) * 2 - 1
                mouse.y = -(event.clientY / window.innerHeight) * 2 + 1

                raycaster.setFromCamera(mouse, camera)
                const normal = new THREE.Vector3().copy(camera.position).sub(controls.target).normalize()
                const plane = new THREE.Plane().setFromNormalAndCoplanarPoint(normal, controls.target)
                const intersectPoint = new THREE.Vector3()
                raycaster.ray.intersectPlane(plane, intersectPoint)

                if (intersectPoint) {
                    const newCamPos = camera.position.clone().sub(intersectPoint).multiplyScalar(zoomFactor).add(
                        intersectPoint)
                    const newTarget = controls.target.clone().sub(intersectPoint).multiplyScalar(zoomFactor).add(
                        intersectPoint)
                    const distToSun = newCamPos.length()
                    if (distToSun > 7 && distToSun < 3500) {
                        camera.position.copy(newCamPos)
                        controls.target.copy(newTarget)
                        controls.update()
                    }
                }
            }, { passive: false })

            window.addEventListener('dblclick', (event) => {
                mouse.x = (event.clientX / window.innerWidth) * 2 - 1
                mouse.y = -(event.clientY / window.innerHeight) * 2 + 1

                raycaster.setFromCamera(mouse, camera)
                const intersects = raycaster.intersectObjects(interactables, true)

                if (intersects.length > 0) {
                    let obj = intersects[0].object
                    while (obj && !interactables.includes(obj)) {
                        obj = obj.parent
                    }
                    if (obj && interactables.includes(obj)) {
                        targetObject = obj
                    }
                } else {
                    targetObject = null
                    controls.target.set(0, 0, 0)
                }
            })

            // ─────────────────────────────────────
            // 13. ANIMATION LOOP
            // ─────────────────────────────────────
            const clock = new THREE.Clock()

            function animate() {
                requestAnimationFrame(animate)

                const dt = Math.min(clock.getDelta(), 0.1)
                const elapsed = performance.now() * 0.001

                // Original Sun & Planets Animation
                sun.rotation.y += 0.0015
                coronaParticles.rotation.y += 0.0008
                coronaParticles.rotation.x += 0.0003
                corona.rotation.y -= 0.0005

                const pulse = 1 + Math.sin(elapsed * 2.5) * 0.04 + Math.sin(elapsed * 5.7) * 0.02
                glowMeshes.forEach((g, i) => {
                    g.scale.setScalar(pulse + i * 0.01)
                    g.material.opacity = glowLayers[i].opacity * (0.9 + Math.sin(elapsed * 3 + i) * 0.1)
                })
                corona.material.opacity = 0.35 + Math.sin(elapsed * 4) * 0.08
                coronaParticleMat.opacity = 0.6 + Math.sin(elapsed * 3.5) * 0.15

                planets.forEach(p => {
                    p.pivot.rotation.y += p.speed
                    p.mesh.rotation.y += 0.008
                })

                if (moonPivot) {
                    moonPivot.rotation.y += 0.022
                }
                if (earthClouds) {
                    earthClouds.rotation.y += 0.01
                }
                asteroidBelt.rotation.y += 0.00025

                // Black Hole Animation
                accretionDisk.rotation.z -= 0.01

                // Update Halo View Vector for Fresnel effect
                bhHaloMat.uniforms.viewVector.value = new THREE.Vector3().subVectors(camera.position, blackHoleGroup.position)

                // "Pulling Space" logic when Black Hole is focused
                const pullPositions = bhParticleGeo.attributes.position.array
                let isBHFocused = targetObject && targetObject.name === 'Black Hole'

                if (isBHFocused) {
                    bhParticleMat.opacity = Math.min(0.8, bhParticleMat.opacity + 0.02)
                } else {
                    bhParticleMat.opacity = Math.max(0.0, bhParticleMat.opacity - 0.02)
                }

                // Update particles
                for (let i = 0; i < bhParticleCount; i++) {
                    let r = bhRadii[i]
                    if (isBHFocused) {
                        r -= (r * 0.03 + 1.0) // Pull heavily inward
                        if (r < ehRadius) r = 800 // Reset outside
                        bhRadii[i] = r
                    } else {
                        // Slow drift
                        bhAngles[i * 2] -= 0.001
                    }
                    const theta = bhAngles[i * 2] + (800 - r) * 0.004 // Spiral swirl effect
                    const phi = bhAngles[i * 2 + 1]

                    pullPositions[i * 3] = r * Math.sin(phi) * Math.cos(theta)
                    pullPositions[i * 3 + 1] = r * Math.cos(phi)
                    pullPositions[i * 3 + 2] = r * Math.sin(phi) * Math.sin(theta)
                }
                bhParticleGeo.attributes.position.needsUpdate = true

                // Dynamic Camera Focus & Warp effect
                if (targetObject) {
                    const targetPosition = new THREE.Vector3()
                    targetObject.getWorldPosition(targetPosition)
                    controls.target.lerp(targetPosition, 0.08)

                    if (targetObject.name === 'Black Hole') {
                        controls.minDistance = 90 // Prevent clipping into event horizon
                        camera.fov = THREE.MathUtils.lerp(camera.fov, 70, 0.02) // Warp FOV effect
                    } else {
                        controls.minDistance = 8
                        camera.fov = THREE.MathUtils.lerp(camera.fov, 42, 0.05)
                    }
                    camera.updateProjectionMatrix()
                } else {
                    controls.minDistance = 8
                    camera.fov = THREE.MathUtils.lerp(camera.fov, 42, 0.05)
                    camera.updateProjectionMatrix()
                }

                controls.update()
                composer.render()
            }

            // ─────────────────────────────────────
            // 14. RESIZE HANDLER
            // ─────────────────────────────────────
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight
                camera.updateProjectionMatrix()
                renderer.setSize(window.innerWidth, window.innerHeight)
                composer.setSize(window.innerWidth, window.innerHeight)
                bloomPass.resolution.set(window.innerWidth, window.innerHeight)
            })

            // ─────────────────────────────────────
            // 15. START
            // ─────────────────────────────────────
            animate()
        })();
    </script>
</body>

</html>
